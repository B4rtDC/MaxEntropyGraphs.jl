# The performance harness is pinned to the same Julia LTS baseline as the package
# (see ../NOTES.md, which documents the 1.10 baseline used for the 0.5.0 results).
# A reviewer reproducing the benchmarks should use Julia 1.10 to match the
# published numbers; the harness itself runs on 1.10 - 1.12.
[compat]
BenchmarkTools = "1"
Graphs = "1.9"
JSON = "0.21"
MaxEntropyGraphs = "0.6"
Measures = "0.3"
# Plots >= 1.41 is required for Julia 1.12 (earlier 1.40.x hit a Scratch.jl/GR precompile bug).
Plots = "1.41"
StatsPlots = "0.15"
julia = "1.10"
