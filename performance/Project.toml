# Julia 1.10 LTS is the package's minimum supported version (the CI matrix covers
# 1.10, 1.11 and 1.12). It is the correctness floor, not the benchmark target: the
# numbers reported in the paper were produced on Julia 1.12.6 (see ../NOTES.md), so a
# reviewer reproducing them should use 1.12.6. The harness runs on any of 1.10 to 1.12.
[compat]
BenchmarkTools = "1"
Graphs = "1.9"
JSON = "0.21"
MaxEntropyGraphs = "0.7"
Measures = "0.3"
# Plots >= 1.41 is required for Julia 1.12 (earlier 1.40.x hit a Scratch.jl/GR precompile bug).
Plots = "1.41"
StatsPlots = "0.15"
julia = "1.10"
