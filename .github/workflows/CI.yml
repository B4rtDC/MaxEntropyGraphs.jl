name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags: ['*']
# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'pre' }}
    env:
      JULIA_NUM_THREADS: '2'   # exercise the threaded sampling / p-value paths
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'   # LTS (minimum supported)
          - '1.11'
          - '1.12'   # current stable release
          - 'pre'    # next prerelease (beyond the current stable)
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        include:
          # Apple Silicon (native aarch64) on the LTS
          - os: macos-latest
            arch: aarch64
            version: '1.10'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Verify the package still resolves and tests against its declared [compat] LOWER bounds — i.e.
  # the oldest dependency versions it claims to support (julia-downgrade-compat pins each dep to its
  # minimum, then we build + test).
  #
  # NOTE on the (long) skip list below: this package depends on Optimization 4, which pulls in a
  # large, *modern* SciML transitive tree (SciMLBase, Symbolics, ADTypes, OptimizationBase, …). As a
  # result, the OLDEST version of several otherwise-independent deps would drag in a stale transitive
  # dependency that cannot coexist with that tree (e.g. NLsolve 4.5.0 needs Reexport 0.2 while
  # Optimization needs Reexport 1.2; ReverseDiff 1.15 predates ForwardDiff 1.x; Distributions 0.25.0
  # pulls old StatsBase/etc.). Those deps' *effective* floor is dictated by the ecosystem, not by this
  # package, so pinning them individually is meaningless and unsatisfiable — they are excluded via
  # `skip`. The job still validates the floors this package genuinely controls (Optimization itself,
  # OptimizationOptimJL, and the small stable utilities).
  downgrade:
    name: Downgrade compat - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_THREADS: '2'
      # Skip the symbolic moment identities in THIS job only (they run everywhere else). Pinning
      # Optimization to its 4.0.5 floor drags its SciML tree back too, resolving Symbolics 6.58
      # instead of the 7.x used by every other job. The `ratzero` oracle in test/symbolics.jl treats
      # "substitution did not fold to a Number" as "not zero", and Symbolics 6 does not fold the UECM
      # generating function at t=0 — a false negative about the *oracle*, not the package: the
      # identity holds (proven on Symbolics 7, Monte-Carlo-gated in validation/). Symbolics is a
      # test-only dep that no user of this package resolves, so its transitive floor is out of scope
      # here, exactly like the `skip` list above.
      MEG_SKIP_SYMBOLIC: '1'
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/julia-downgrade-compat@v1
        with:
          # Skipped: stdlibs (Pkg/TOML/LinearAlgebra/SparseArrays/Printf/Logging/Random — versioned
          # with Julia), plus the 7 deps whose lowest version cannot coexist with Optimization 4's
          # transitive tree (Graphs/Distributions/NLsolve/ForwardDiff/ReverseDiff/Zygote/FiniteDiff;
          # see the note on this job above). Verified locally that pinning every remaining dep to its
          # floor resolves and installs.
          skip: Pkg,TOML,LinearAlgebra,SparseArrays,Printf,Logging,Random,Graphs,Distributions,NLsolve,ForwardDiff,ReverseDiff,Zygote,FiniteDiff
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
