name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags: ['*']
# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'pre' }}
    env:
      JULIA_NUM_THREADS: '2'   # exercise the threaded sampling / p-value paths
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'   # LTS (minimum supported)
          - '1.11'
          - '1.12'   # current stable release
          - 'pre'    # next prerelease (beyond the current stable)
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        include:
          # Apple Silicon (native aarch64) on the LTS
          - os: macos-latest
            arch: aarch64
            version: '1.10'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Verify the declared [compat] LOWER bounds are honest: resolve every dependency
  # to its minimum allowed version and run the suite.
  downgrade:
    name: Downgrade compat - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_THREADS: '2'
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/julia-downgrade-compat@v1
        with:
          # stdlibs are versioned with Julia itself; the AD deps (ForwardDiff/Zygote) have their
          # effective floor dictated by the tightly-coupled SciML stack (Optimization/OptimizationBase),
          # not by this package, so don't pin them to their independent lowest bound.
          skip: Pkg,TOML,LinearAlgebra,SparseArrays,Printf,Logging,Random,ForwardDiff,Zygote
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
